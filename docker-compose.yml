services:
  app:
    build: .
    container_name: unicred_api
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://mongo:27017
      MONGODB_DB_NAME: unicred_voting
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      VOTER_VALIDATION_URL: https://user-info.herokuapp.com
      SESSION_CLOSE_INTERVAL_SECONDS: 30
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - unicred_net
    restart: unless-stopped

  mongo:
    image: mongo:7.0
    container_name: unicred_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - unicred_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: unicred_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - unicred_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:

networks:
  unicred_net:
    driver: bridge
